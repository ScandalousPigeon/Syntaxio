name: Syntaxio CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: "pom.xml"

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and run tests
        run: ./mvnw -B -ntp clean verify

      - name: Upload test reports if build fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: target/surefire-reports/

      - name: Upload packaged JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: syntaxio-jar
          path: target/*.jar
